<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="之渡的个人博客">
  <meta name="author" content="zhdu">
  <title>这是一个博客</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="canonical" href="https://zhduferry.github.io/">
  <meta property="og:title" content="这是一个博客">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://zhduferry.github.io/">
  <meta property="og:site_name" content="这是一个博客">
  <meta property="og:description" content="之渡的个人博客">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="/">这是一个博客</a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/archives/">归档</a>
      <button id="dark-toggle" aria-label="切换暗黑模式">◐</button>
    </div>
    <input type="range" id="glass-slider" min="0.3" max="1" step="0.01" value="0.88" title="透明度">
  </div>
</nav>

<main>
  <section class="hero">
    <h1></h1>
    <p></p>
  </section>

  <section class="post-list" id="post-list">
    <p style="text-align:center;color:var(--text-secondary)">加载中…</p>
  </section>
</main>

<footer>
  <p>&copy; 2025 zhdu · 之渡的个人博客 · <a href="https://github.com/zhduferry">GitHub</a></p>
</footer>

<script src="/js/script.js"></script>
<script>
(async () => {
  try {
    const res = await fetch('/posts/posts.json');
    const posts = await res.json();
    const list = document.getElementById('post-list');
    if (!posts.length) { list.innerHTML = '<p style="text-align:center;color:var(--text-secondary)">暂无文章</p>'; return; }
    list.innerHTML = posts.map(p =>
      '<article class="post-card">' +
        '<h2><a href="/' + p.path.replace('post.md', '') + '">' + p.title + '</a></h2>' +
        '<div class="meta">' + p.date + '</div>' +
        '<p class="excerpt">' + p.excerpt + '</p>' +
      '</article>'
    ).join('');
  } catch(e) {
    document.getElementById('post-list').innerHTML = '<p style="text-align:center;color:var(--text-secondary)">加载失败</p>';
  }
})();
</script>
</body>
</html>
