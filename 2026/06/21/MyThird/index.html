<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="之渡的个人博客">
  <meta name="author" content="zhdu">
  <title>MyNewPost - 这是一个博客</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="canonical" href="https://zhduferry.github.io/2025/03/07/MyNewPost/">
  <meta property="og:title" content="MyNewPost">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://zhduferry.github.io/2025/03/07/MyNewPost/">
  <meta property="og:site_name" content="这是一个博客">
  <meta property="og:description" content="之渡的个人博客">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="/">这是一个博客</a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/archives/">归档</a>
      <button id="dark-toggle" aria-label="切换暗黑模式">◐</button>
    </div>
    <input type="range" id="glass-slider" min="0.3" max="1" step="0.01" value="0.88" title="透明度">
  </div>
</nav>

<main>
  <article>
    <header>
      <h1 id="post-title">MyNewPost</h1>
      <div id="post-meta" class="meta">2025-03-07 &middot; zhdu</div>
    </header>
    <div id="post-body" class="post-body">加载中…</div>
    <nav class="post-nav" id="post-nav"></nav>
  </article>
</main>

<footer>
  <p>&copy; 2025 zhdu · 之渡的个人博客 · <a href="https://github.com/zhduferry">GitHub</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/js/script.js"></script>
<script>
const SLUG = 'mythird';
(async () => {
  try {
    const res = await fetch('/posts/posts.json');
    const posts = await res.json();
    const meta = posts.find(p => p.slug === SLUG);
    if (!meta) { document.getElementById('post-body').textContent = '文章未找到'; return; }

    document.title = meta.title + ' - 这是一个博客';
    document.getElementById('post-title').textContent = meta.title;
    document.getElementById('post-meta').textContent = meta.date + ' · zhdu';
    document.querySelector('link[rel="canonical"]').href = 'https://zhduferry.github.io/' + meta.path.replace('post.md', '');

    const idx = posts.indexOf(meta);
    const prev = idx < posts.length - 1 ? posts[idx + 1] : null;
    const next = idx > 0 ? posts[idx - 1] : null;
    const nav = document.getElementById('post-nav');
    if (prev) nav.innerHTML += '<span class="prev"><a href="/' + prev.path.replace('post.md', '') + '">&larr; ' + prev.title + '</a></span>';
    else nav.innerHTML += '<span class="prev"></span>';
    if (next) nav.innerHTML += '<span class="next"><a href="/' + next.path.replace('post.md', '') + '">' + next.title + ' &rarr;</a></span>';
    else nav.innerHTML += '<span class="next"></span>';

    const md = await fetch('/' + meta.path);
    const text = await md.text();
    document.getElementById('post-body').innerHTML = marked.parse(text);
  } catch(e) {
    document.getElementById('post-body').textContent = '加载失败: ' + e.message;
  }
})();
</script>
</body>
</html>
