<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="之渡的个人博客">
  <meta name="author" content="zhdu">
  <title>归档 - 之渡的博客</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="canonical" href="https://zhduferry.github.io/archives/">
  <meta property="og:title" content="归档 - 之渡的博客">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://zhduferry.github.io/archives/">
  <meta property="og:site_name" content="之渡的博客">
  <meta property="og:description" content="之渡的个人博客">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="/">之渡的博客</a>
    <div class="nav-links">
      <a href="/">首页</a>
      <a href="/archives/">归档</a>
      <button id="dark-toggle" aria-label="切换暗黑模式">◐</button>
    </div>
    <input type="range" id="glass-slider" min="0.1" max="1" step="0.01" value="0.88" title="透明度">
  </div>
</nav>

<main id="archive-content">
  <p style="text-align:center;color:var(--text-secondary)">加载中…</p>
</main>

<footer>
  <p>&copy; 2025 zhdu · 之渡的个人博客 · <a href="https://github.com/zhduferry">GitHub</a></p>
</footer>

<script src="/js/script.js"></script>
<script>
(async () => {
  try {
    const res = await fetch('/posts/posts.json');
    const posts = await res.json();
    const main = document.getElementById('archive-content');
    if (!posts.length) { main.innerHTML = '<p style="text-align:center;color:var(--text-secondary)">暂无文章</p>'; return; }

    // 按年分组
    const byYear = {};
    posts.forEach(p => {
      const year = p.date.substring(0, 4);
      if (!byYear[year]) byYear[year] = [];
      byYear[year].push(p);
    });

    let html = '';
    Object.keys(byYear).sort().reverse().forEach(year => {
      html += '<h2 class="archive-year">' + year + '</h2><ul class="archive-list">';
      byYear[year].forEach(p => {
        const d = p.date.substring(5);
        html += '<li class="archive-item"><span class="date">' + d + '</span><a href="/' + p.path.replace('post.md', '') + '">' + p.title + '</a></li>';
      });
      html += '</ul>';
    });
    main.innerHTML = html;
  } catch(e) {
    document.getElementById('archive-content').innerHTML = '<p style="text-align:center;color:var(--text-secondary)">加载失败</p>';
  }
})();
</script>
</body>
</html>
